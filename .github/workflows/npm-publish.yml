name: Publish to npm

on:
  push:
    tags:
      - 'v*'
      - 'tagger-v*'

jobs:
  scaffold-cli:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install and build scaffold-cli
        working-directory: cli
        run: |
          npm ci
          npm run build

      - name: Publish scaffold-cli
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  react-vite-component-tagger:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install and build
        working-directory: packages/react-vite-component-tagger
        run: |
          npm ci
          npm run build

      - name: Publish
        working-directory: packages/react-vite-component-tagger
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  nextjs-webpack-component-tagger:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install and build
        working-directory: packages/nextjs-webpack-component-tagger
        run: |
          npm ci
          npm run build

      - name: Publish
        working-directory: packages/nextjs-webpack-component-tagger
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
